name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Install dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq build-essential git unzip zip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libtinfo5 cmake libffi-dev libssl-dev
        pip install --upgrade pip
        pip install kivy buildozer cython
    - name: Build APK
      run: buildozer android debug 2>&1 | tail -80
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: doudizhu-apk
        path: bin/*.apk
        retention-days: 30
